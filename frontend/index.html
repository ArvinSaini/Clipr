<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="description" content="Clipr — Shorten any URL instantly. Fast, free, and beautiful link shortener." />
    <meta name="theme-color" content="#613ea8" />
    <title>Clipr — Shorten Any URL</title>

    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23613ea8'/%3E%3Ctext x='50' y='66' font-size='42' text-anchor='middle' fill='%23fff' font-family='Arial,Helvetica,sans-serif' font-weight='bold'%3ECl%3C/text%3E%3C/svg%3E" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="styles.css" />

    <!-- Three.js + Vanta Clouds -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.clouds.min.js"></script>
  </head>
  <body>
    <!-- Full-screen Vanta cloud background -->
    <div id="vanta-bg"></div>

    <main class="container">

      <!-- Brand -->
      <div class="brand">
        <div class="logo-badge">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/>
            <line x1="20" y1="4" x2="8.12" y2="15.88"/>
            <line x1="14.47" y1="14.48" x2="20" y2="20"/>
            <line x1="8.12" y1="8.12" x2="12" y2="12"/>
          </svg>
        </div>
        <h1>Clipr</h1>
        <p class="tagline">Shorten. Share. Done.</p>
      </div>

      <!-- Form -->
      <form id="shorten-form">
        <div class="input-wrap">
          <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
          </svg>
          <label for="url-input" class="sr-only">Enter a URL</label>
          <input id="url-input" name="url" type="url" placeholder="Paste your long URL here…" required autocomplete="off" />
        </div>
        <button type="submit" id="shorten-btn">
          <span>Shorten</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        </button>
      </form>

      <!-- Status message -->
      <div id="message"></div>

      <!-- Result -->
      <section id="result" class="hidden">
        <div class="result-header">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          <span>Link ready!</span>
        </div>
        <div class="result-row">
          <a id="short-link" href="#" target="_blank" rel="noopener">—</a>
          <div class="buttons">
            <button id="copy-btn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
              </svg>
              Copy
            </button>
            <button id="open-btn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
              </svg>
              Open
            </button>
          </div>
        </div>
        <div id="analytics" class="analytics">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/>
            <line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/>
          </svg>
          <span class="analytics-label">Total Clicks:</span>
          <span id="click-count">—</span>
        </div>
        <p id="notice" class="notice-text"></p>
      </section>

      <!-- Feature pills -->
      <div class="features">
        <span class="pill">⚡ Instant</span>
        <span class="pill">🔒 Secure</span>
        <span class="pill">📊 Analytics</span>
        <span class="pill">∞ Free</span>
      </div>

      <!-- Footer -->
      <footer class="footer">
        Made with <span class="heart">♥</span> by
        <a href="https://arvinsaini.tech" target="_blank" rel="noopener">Arvin Saini</a>
      </footer>

    </main>

    <script src="script.js"></script>
    <script>
      VANTA.CLOUDS({
        el: "#vanta-bg",
        mouseControls: true,
        touchControls: true,
        gyroControls: false,
        minHeight: 200.00,
        minWidth: 200.00
      });
    </script>
  </body>
</html>
