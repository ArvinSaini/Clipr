<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>URL Shortener</title>
  <!-- simple inline SVG favicon showing "URL" so no separate file is required -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23613ea8'/%3E%3Ctext x='50' y='62' font-size='48' text-anchor='middle' fill='%23fff' font-family='Arial,Helvetica,sans-serif'%3EURL%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>URL Shortener</h1>

      <form id="shorten-form">
        <label for="url-input">Enter a URL</label>
        <input id="url-input" name="url" type="url" placeholder="https://example.com" required />
        <button type="submit">Shorten</button>
      </form>

      <section id="result" class="hidden">
        <h2>Shortened URL</h2>
        <div class="result-row">
          <a id="short-link" href="#" target="_blank" rel="noopener">—</a>
          <div class="buttons">
            <button id="copy-btn">Copy</button>
            <button id="open-btn">Open</button>
          </div>
        </div>
        <div id="analytics" class="analytics">
          <span class="analytics-icon">📊</span>
          <span class="analytics-label">Total Clicks:</span>
          <span id="click-count">—</span>
        </div>
        <p id="notice" class="muted"></p>
      </section>

      <div id="message" class="muted"></div>

      <footer class="footer">
        Made by <a href="https://arvinsaini.tech" target="_blank" rel="noopener">Arvin Saini</a>
      </footer>
    </main>

    <script src="script.js"></script>
  </body>
</html>
